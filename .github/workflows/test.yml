name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (core only, no Sionna)
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --ignore=tests/test_sionna_builtin.py

      - name: Run examples
        run: |
          python3 examples/01_basic_uwb_tdl.py
          python3 examples/02_compare_algorithms.py

      - name: Check CLI
        run: |
          radiorange --help
          radiorange --list-scenes
          radiorange --scene tdl_a --radios uwb --algo threshold --trials 5 --impairments none
